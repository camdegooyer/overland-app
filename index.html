<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Overland — App</title>
  <style>
    :root {
      --ink: #1a1a1a;
      --paper: #f5f1ea;
      --accent: #b8642a;
      --muted: #6b6b6b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
    }
    main { max-width: 560px; text-align: center; }
    .eyebrow {
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.75rem;
    }
    h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 1.25rem;
    }
    p {
      font-size: 1.0625rem;
      line-height: 1.65;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }
    .footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #999;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">Overland Builders</div>
    <h1>Something's being built here.</h1>
    <p>This space is reserved for an internal team tool and a client portal.</p>
    <p>If you've landed here by accident, the main site is at <a href="https://overlandbuilders.com.au" style="color: var(--accent);">overlandbuilders.com.au</a>.</p>
    <div class="footer">app.overlandbuilders.com.au</div>
  </main>
</body>
</html>
